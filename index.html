  }

  // copy a row's last-time placeholders into its blank inputs
  function fillRowFromLast(row){
    Array.prototype.forEach.call(row.querySelectorAll("input"),function(inp){
      if(inp.value===""&&inp.placeholder!=="") inp.value=inp.placeholder;
    });
  }

  function bindSession(){
    // cancel / discard (two-tap armed, as before)
    var x=$("cancel");
    if(x) x.addEventListener("click",function(){
      if(x.classList.contains("armed")){
        var wasEdit=!!editingRef;
        if(!wasEdit) draftClear(); // an explicit discard removes the draft too
        sess=null; editingRef=null; view="home";
        stopRest();
        render();
        if(wasEdit) toast("Edit cancelled — nothing changed");
      }
      else { x.classList.add("armed"); x.innerHTML=editingRef?"Cancel edit?":"Discard?"; x.style.width="auto"; x.style.padding="0 12px"; x.style.fontSize="13px"; x.style.fontWeight="700";
        setTimeout(function(){ if($("cancel")){ x.classList.remove("armed"); x.innerHTML="&times;"; x.style.width="36px"; x.style.padding=""; x.style.fontSize="17px"; } },3000); }
    });
    // warmup / cooldown toggles
    Array.prototype.forEach.call(document.querySelectorAll("[data-wu]"),function(el){
      el.addEventListener("click",function(){ var i=+el.dataset.wu; sess.warmup[i]=!sess.warmup[i];
        el.classList.toggle("on"); el.setAttribute("aria-pressed",sess.warmup[i]?"true":"false");
        el.querySelector(".box").innerHTML=sess.warmup[i]?"✓":""; draftSave(); });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-cd]"),function(el){
      el.addEventListener("click",function(){ var i=+el.dataset.cd; sess.cooldown[i]=!sess.cooldown[i];
        el.classList.toggle("on"); el.setAttribute("aria-pressed",sess.cooldown[i]?"true":"false");
        el.querySelector(".box").innerHTML=sess.cooldown[i]?"✓":""; draftSave(); });
    });
    // cardio options
    Array.prototype.forEach.call(document.querySelectorAll("[data-cardio]"),function(el){
      el.addEventListener("click",function(){
        sess.cardio.type=el.dataset.cardio; var ht=$("cardio-type"); if(ht) ht.value=el.dataset.cardio;
        Array.prototype.forEach.call(document.querySelectorAll("[data-cardio]"),function(o){o.classList.remove("on");o.setAttribute("aria-pressed","false");});
        el.classList.add("on"); el.setAttribute("aria-pressed","true");
        draftSave();
      });
    });
    // knee toggles
    function bindKnee(toggleId,alertId){
      var t=$(toggleId); if(!t) return;
      t.addEventListener("click",function(){
        sess.kneeFlag=!sess.kneeFlag;
        var box=t.querySelector(".box");
        if(sess.kneeFlag){ box.style.background="#C9A23B"; box.style.borderColor="#C9A23B"; box.innerHTML="&#33;"; t.style.background="var(--mint-2)"; t.style.borderColor="#EBD9A6"; }
        else{ box.style.background=""; box.style.borderColor=""; box.innerHTML=""; t.style.background=""; t.style.borderColor="var(--line)"; }
        t.setAttribute("aria-pressed",sess.kneeFlag?"true":"false");
        var al=$(alertId); if(al) al.classList.toggle("show",sess.kneeFlag);
        draftSave();
      });
    }
    bindKnee("knee-toggle","knee-alert");
    bindKnee("knee-toggle2","knee-alert2");
    // cardio-day option cards (switching options resets the block checklist)
    Array.prototype.forEach.call(document.querySelectorAll("[data-opt]"),function(el){
      el.addEventListener("click",function(){
        var o=el.dataset.opt;
        if(sess.option!==o){
          // stash the outgoing option's entries and restore them if she comes
          // back — an exploratory tap (especially mid-edit) must never lose data.
          // _optCache is wizard-only: normalizeSession strips it from saves/drafts.
          sess._optCache=sess._optCache||{};
          if(sess.option){
            sess._optCache[sess.option]={blocks:sess.blocks, minutes:sess.minutes,
              resistance:sess.resistance, rounds:sess.rounds, machine:sess.machine};
          }
          var c=sess._optCache[o];
          sess.option=o;
          if(c){
            sess.blocks=c.blocks; sess.minutes=c.minutes;
            sess.resistance=c.resistance; sess.rounds=c.rounds; sess.machine=c.machine;
          } else {
            sess.blocks=PROGRAM.cardioday.options[o].blocks.map(function(){return false;});
            sess.minutes=""; sess.resistance=""; sess.rounds="";
            sess.machine = o==="A" ? PROGRAM.cardioday.options.A.machines[0] : "";
          }
        }
        Array.prototype.forEach.call(document.querySelectorAll("[data-opt]"),function(x){
          x.classList.remove("on"); x.setAttribute("aria-pressed","false");
        });
        el.classList.add("on"); el.setAttribute("aria-pressed","true");
        draftSave();
      });
    });
    // cardio-day activity select (Option A): swaps the cue and the extra input
    var cdm=$("cd-machine");
    if(cdm){
      var prevMach=cdm.value;
      cdm.addEventListener("change",function(){
        gather(); // pull minutes/extra into sess before the re-render
        if(cdm.value!==prevMach) sess.resistance=""; // lvl and % aren't the same number
        sess.machine=cdm.value;
        draftSave();
        render();
      });
    }
    // cardio-day phase blocks
    Array.prototype.forEach.call(document.querySelectorAll("[data-blk]"),function(el){
      el.addEventListener("click",function(){
        var i=+el.dataset.blk;
        sess.blocks[i]=!sess.blocks[i];
        el.classList.toggle("on");
        el.setAttribute("aria-pressed",sess.blocks[i]?"true":"false");
        el.querySelector(".box").innerHTML=sess.blocks[i]?"✓":"";
        draftSave();
      });
    });
    // set stamps: fill blanks from last time, mark done, start the rest timer
    Array.prototype.forEach.call(document.querySelectorAll(".set-row .stamp"),function(st){
      st.addEventListener("click",function(){
        var row=st.closest(".set-row");
        if(!row.classList.contains("done")){
          row.classList.add("done"); st.setAttribute("aria-pressed","true");
          if(!editingRef){ // amending a record: never inject another session's numbers or start a timer
            fillRowFromLast(row);
            // last set of this exercise done -> longer rest into the next exercise
            var rows=document.querySelectorAll(".set-row");
            var allDone=rows.length>0;
            for(var i=0;i<rows.length;i++){ if(!rows[i].classList.contains("done")){ allDone=false; break; } }
            startRest(allDone?REST_EX:REST_SET, allDone?"NEXT EXERCISE":"REST");
          }
        } else {
          row.classList.remove("done"); st.setAttribute("aria-pressed","false");
        }
        gather(); draftSave();
      });
    });
    // "tap to use" on the last-time line: bulk-fill blanks on this exercise
    var fa=$("fill-all");
    if(fa){
      var faFn=function(){
        Array.prototype.forEach.call(document.querySelectorAll(".set-row"),fillRowFromLast);
        gather(); draftSave();
      };
      fa.addEventListener("click",faFn);
      fa.addEventListener("keydown",function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); faFn(); } });
    }
    // suggestion chip: fill blank load inputs with the suggested value; un-tap restores
    var sg=$("sugg-fill");
    if(sg){
      var snapshot=null;
      sg.addEventListener("click",function(){
        var filled=sg.classList.toggle("filled");
        sg.setAttribute("aria-pressed",filled?"true":"false");
        var inputs=document.querySelectorAll(".set-row .in-a");
        if(filled){
          snapshot=Array.prototype.map.call(inputs,function(i){return i.value;});
          Array.prototype.forEach.call(inputs,function(i){ if(i.value==="") i.value=sg.dataset.to; });
        } else {
          Array.prototype.forEach.call(inputs,function(i,idx){ if(snapshot&&snapshot[idx]!==undefined) i.value=snapshot[idx]; });
          snapshot=null;
        }
        gather(); draftSave();
      });
    }
    renderNav();
  }

  function renderNav(){
    var N=PROGRAM[sess.dayType].exercises.length;
    var isFirst=step===0; var isLast=step===N+3;
    var h="";
    if(!isFirst) h+='<button class="btn btn-ghost" id="back">Back</button>';
    h+='<button class="btn btn-primary" id="next">'+(isLast?(editingRef?"Update Session":"Save Session"):"Next")+'</button>';
    $("nav-inner").innerHTML=h;
    var b=$("back"); if(b) b.addEventListener("click",function(){ gather(); draftSave(); step--; render(); });
    $("next").addEventListener("click",function(){
      gather();
      if(sess.dayType==="cardioday"&&step===0&&!sess.option){
        toast("Pick an option first — A, B, or C");
        return;
      }
      if(isLast){ saveSession(); }
      else { draftSave(); step++; render(); }
    });
  }

  function saveSession(){
    // the explicit knee toggle is authoritative; notes never override it
    var wasEdit=!!editingRef;
    var finished={
      date:sess.date, dayType:sess.dayType,
      _t: wasEdit&&editingRef._t ? editingRef._t : freshT(),
      warmup:sess.warmup, exercises:sess.exercises.concat(sess._extras||[]),
      cardio:sess.cardio, cooldown:sess.cooldown,
      notes:sess.notes, kneeFlag:sess.kneeFlag
    };
    if(sess.dayType==="cardioday"){
      finished.option=sess.option; finished.blocks=sess.blocks;
      finished.minutes=sess.minutes; finished.resistance=sess.resistance; finished.rounds=sess.rounds;
      finished.machine=sess.machine;
    }
    if(wasEdit) finished._edited=Date.now();
    // canonicalize through the same normalization load() applies, so the durable
    // record matches what a reload reproduces (also strips draft-only _done flags)
    finished=normalizeSession(finished)||finished;
    if(wasEdit){
      var i=DB.sessions.indexOf(editingRef);
      if(i>-1) DB.sessions[i]=finished; else DB.sessions.push(finished);
    } else {
      DB.sessions.push(finished);
    }
    var ok=save();
    // a draft never belongs to an edit; and if the save failed, the draft is the
    // only durable copy of this workout — keep it so Resume still works
    if(!wasEdit&&ok) draftClear();
    stopRest();
    var type=finished.dayType;
    sess=null; editingRef=null; view=wasEdit?"history":"home"; render();
    if(!ok){ toast("Saved for this visit only — export a backup before closing"); return; }
    if(wasEdit){ toast("Session updated"); return; }
    var w=weekOf(new Date(finished.date));
    var tail="";
    if(w>=0&&w<=3){
      var label=(w===weekOf(new Date()))?"this week":"that week";
      tail=" — "+buildCycleCounts().weeks[w].total+" of "+DB.meta.cycle.weeklyGoal+" "+label;
    }
    toast(PROGRAM[type].short+" session logged"+tail);
  }

  /* ---------- progress ledger ---------- */
  function exerciseSeries(){
    var sorted=DB.sessions.slice().sort(function(a,b){return a.date<b.date?-1:1;});
    var map={}, order=[];
    sorted.forEach(function(s){
      // cardio days chart total minutes — the simplest honest fitness trend
      if(s.dayType==="cardioday"&&s.minutes!==""&&s.minutes!=null){
        var cn="Cardio day (minutes)";
        if(!map[cn]){ map[cn]=[]; order.push(cn); }
        map[cn].push({date:s.date, v:Number(s.minutes), vol:0, unit:"min"});
      }
      (s.exercises||[]).forEach(function(e){
        var v=topVal(e.kind,e);
        if(v==null) return;
        var vol=0;
        if(e.kind==="wr"){ e.sets.forEach(function(st){ vol+=(Number(st.weight)||0)*(Number(st.reps)||0); }); }
        if(!map[e.name]){ map[e.name]=[]; order.push(e.name); }
        map[e.name].push({date:s.date, v:v, vol:vol, unit:progUnit(e.kind)});
      });
    });
    return {map:map, order:order};
  }
  function sparklineSVG(pts, prIdx){
    var W=560,H=64,P=8;
    var vals=pts.map(function(p){return p.v;});
    var min=Math.min.apply(null,vals), max=Math.max.apply(null,vals);
    var span=(max-min)||1;
    function x(i){ return pts.length>1 ? P+i*((W-2*P)/(pts.length-1)) : W/2; }
    function y(v){ return H-P-((v-min)/span)*(H-2*P); }
    var poly=pts.map(function(p,i){return x(i).toFixed(1)+","+y(p.v).toFixed(1);}).join(" ");
    var svg='<svg class="spark" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">';
    svg+='<line class="sp-base" x1="'+P+'" y1="'+(H-P)+'" x2="'+(W-P)+'" y2="'+(H-P)+'"/>';
    if(pts.length>1) svg+='<polyline class="sp-line" points="'+poly+'"/>';
    pts.forEach(function(p,i){
      svg+='<circle class="'+(i===prIdx?"sp-pt sp-pr":"sp-pt")+'" cx="'+x(i).toFixed(1)+'" cy="'+y(p.v).toFixed(1)+'" r="'+(i===prIdx?4:2.5)+'"/>';
    });
    return svg+'</svg>';
  }

  /* ---------- history ---------- */
  function bindData(){
    var e=$("export-btn"); if(e) e.addEventListener("click",exportData);
    var i=$("import-btn"); if(i) i.addEventListener("click",pickImport);
  }
  function renderHistory(){
    var h='<div class="bar"><div class="brand">Training<span>.</span></div>'+tabsHTML("history")+'</div>';
    if(!DB.sessions.length){
      h+='<h2 class="section">The record</h2>';
      h+='<div class="empty"><div class="m">&#9745;</div><p>No sessions yet. Your first one starts the history.</p></div>';
      h+='<div class="data-actions"><button class="data-btn" id="export-btn">Export backup</button><button class="data-btn" id="import-btn">Import backup</button></div>';
      root().innerHTML=h; bindTabs(); bindData(); return;
    }

    // remember which items were expanded across the re-render
    // (session rows key on data-t, progress rows on data-ex)
    var openSet={};
    Array.prototype.forEach.call(document.querySelectorAll(".h-item.open"),function(it){
      if(it.dataset.t) openSet["t:"+it.dataset.t]=true;
      if(it.dataset.ex) openSet["x:"+it.dataset.ex]=true;
    });

    var series=exerciseSeries();
    var qualifies={};
    series.order.forEach(function(n){ if(series.map[n].length>=2) qualifies[n]=true; });

    // progress section
    var progH="";
    var orderAll=[];
    ["lower","upper"].forEach(function(t){ PROGRAM[t].exercises.forEach(function(e){ orderAll.push(e.name); }); });
    var names=series.order.slice().sort(function(a,b){
      var ia=orderAll.indexOf(a), ib=orderAll.indexOf(b);
      if(ia!==-1&&ib!==-1) return ia-ib;
      if(ia!==-1) return -1; if(ib!==-1) return 1;
      return a<b?-1:1;
    });
    names.forEach(function(name){
      var pts=series.map[name];
      if(pts.length<2) return;
      var unit=pts[0].unit;
      var first=pts[0], lastP=pts[pts.length-1];
      var delta=lastP.v-first.v;
      var prIdx=0; pts.forEach(function(p,i){ if(p.v>=pts[prIdx].v) prIdx=i; });
      var pr=pts[prIdx];
      var dHtml = delta>0?('<span class="p-delta upd">+'+delta+' '+unit+'</span>')
        :(delta<0?('<span class="p-delta dnd">'+delta+' '+unit+'</span>'):'<span class="p-delta">&mdash;</span>');
      var volLine="";
      if(unit==="lbs"&&lastP.vol>0){
        var pct = first.vol>0 ? Math.round((lastP.vol-first.vol)/first.vol*100) : null;
        volLine='<div class="p-stat">Volume &mdash; '+lastP.vol.toLocaleString()+' lbs last session'+(pct!=null?(' &middot; '+(pct>=0?'+':'')+pct+'% vs first'):'')+'</div>';
      }
      progH+='<div class="h-item p-item" data-ex="'+esc(name)+'"'+'>'+
        '<div class="h-top" role="button" tabindex="0" aria-expanded="false">'+
        '<div class="h-meta"><div class="h-day">'+esc(name)+'</div><div class="h-sub">'+pts.length+' sessions logged</div></div>'+
        dHtml+'<span class="p-latest" style="margin-left:8px;">'+lastP.v+' '+unit+'</span><div class="chev" style="margin-left:8px;">&#9660;</div></div>'+
        '<div class="h-body">'+
        '<div class="spark-wrap">'+sparklineSVG(pts,prIdx)+
        '<div class="spark-dates"><span>'+esc(fmtDay(first.date))+'</span><span>'+esc(fmtDay(lastP.date))+'</span></div></div>'+
        '<div class="p-stat">Best &mdash; '+pr.v+' '+unit+' &middot; '+esc(fmtDay(pr.date))+'</div>'+volLine+
        '</div></div>';
    });
    if(progH){ h+='<h2 class="section">Progress</h2>'+progH; }

    h+='<h2 class="section">The record</h2>';
    var sorted=DB.sessions.slice().sort(function(a,b){
      if(a.date===b.date) return (b._t||0)-(a._t||0);
      return a.date<b.date?1:-1;
    });
    sorted.forEach(function(s,idx){
      var P=PROGRAM[s.dayType];
      var doneEx=s.exercises.filter(function(e){return e.sets.some(function(st){return fmtSet(e.kind,st);});}).length;
      var sub=fmtDate(s.date)+(s._edited?"  ·  amended":"");
      var bCls=s.dayType==="upper"?"up":(s.dayType==="cardioday"?"cd":"");
      var bTxt=s.dayType==="upper"?"U":(s.dayType==="cardioday"?"C":"L");
      var cOpt=(s.dayType==="cardioday"&&s.option)?PROGRAM.cardioday.options[s.option]:null;
      var title=s.dayType==="cardioday"
        ? ('Cardio Day'+(cOpt?(' &middot; '+esc(cOpt.name)):''))
        : (P.short+' Body + Core &middot; '+doneEx+' exercise'+(doneEx===1?"":"s"));
      h+='<div class="h-item" data-t="'+(s._t||"")+'">';
      h+='<div class="h-top" role="button" tabindex="0" aria-expanded="false"><div class="h-badge '+bCls+'">'+bTxt+'</div>'+
         '<div class="h-meta"><div class="h-day">'+title+'</div><div class="h-sub">'+sub+'</div></div>'+
         '<div class="chev">&#9660;</div></div>';
      h+='<div class="h-body">';
      if(s.dayType==="cardioday"){
        if(cOpt){
          h+='<div class="h-tag">'+esc(s.option)+' — '+esc(cOpt.name)+'</div>';
          cOpt.blocks.forEach(function(b,bi){
            var done=!!(s.blocks&&s.blocks[bi]);
            h+='<div class="h-row"><span class="nm" style="'+(done?"":"color:var(--muted);font-weight:500;")+'">'+(done?"&#10003; ":"")+esc(b.name)+'</span><span class="vl">'+esc(b.d)+'</span></div>';
          });
        }
        if(s.machine) h+='<div class="h-row"><span class="nm">Activity</span><span class="vl">'+esc(s.machine)+'</span></div>';
        if(s.minutes) h+='<div class="h-row"><span class="nm">Total time</span><span class="vl">'+esc(s.minutes)+' min</span></div>';
        if(s.resistance){
          var isTread=s.machine==="Treadmill walk (2-3% incline)";
          h+='<div class="h-row"><span class="nm">'+(isTread?"Incline":"Bike resistance")+'</span><span class="vl">'+(isTread?(esc(s.resistance)+"%"):("L"+esc(s.resistance)))+'</span></div>';
        }
        if(s.rounds) h+='<div class="h-row"><span class="nm">Interval rounds</span><span class="vl">'+esc(s.rounds)+'</span></div>';
        var cdOnly=s.cooldown.filter(Boolean).length;
        h+='<div class="h-tag">Checklists</div><div class="h-row"><span class="nm">Cool-down stretches</span><span class="vl">'+cdOnly+'/'+PROGRAM.cooldown.length+'</span></div>';
      } else {
      h+='<div class="h-tag">Strength</div>';
      s.exercises.forEach(function(e){
        var v=lastLine(e.kind,e); if(!v) return;
        var nm = qualifies[e.name]
          ? '<span class="nm linked" role="button" tabindex="0" data-jump="'+esc(e.name)+'" title="View progress">'+esc(e.name)+'</span>'
          : '<span class="nm">'+esc(e.name)+'</span>';
        h+='<div class="h-row">'+nm+'<span class="vl">'+esc(v)+'</span></div>';
      });
      if(s.cardio&&(s.cardio.type||s.cardio.minutes)){
        h+='<div class="h-tag">Cardio</div><div class="h-row"><span class="nm">'+esc(s.cardio.type||"Cardio")+'</span><span class="vl">'+esc(s.cardio.minutes||"?")+' min</span></div>';
      }
      var wuC=s.warmup.filter(Boolean).length, cdC=s.cooldown.filter(Boolean).length;
      h+='<div class="h-tag">Checklists</div><div class="h-row"><span class="nm">Warm-up &amp; cool-down</span><span class="vl">'+wuC+'/'+PROGRAM.warmup.length+' &middot; '+cdC+'/'+PROGRAM.cooldown.length+'</span></div>';
      }
      if(s.kneeFlag) h+='<div class="h-knee">&#9888; Knee discomfort flagged</div>';
      if(s.notes) h+='<div class="h-note">&ldquo;'+esc(s.notes)+'&rdquo;</div>';
      h+='<div class="h-actions"><button class="editb" data-edit="'+idx+'">Edit session</button>'+
         '<button class="del" data-del="'+idx+'">Delete session</button></div>';
      h+='</div></div>';
    });
    h+='<div class="data-actions"><button class="data-btn" id="export-btn">Export backup</button><button class="data-btn" id="import-btn">Import backup</button></div>';
    h+='<button class="reset" id="reset">Erase all history</button>';
    root().innerHTML=h; bindTabs(); bindData();

    // re-apply expanded state
    Array.prototype.forEach.call(document.querySelectorAll(".h-item"),function(it){
      var open=(it.dataset.t&&openSet["t:"+it.dataset.t])||(it.dataset.ex&&openSet["x:"+it.dataset.ex]);
      if(open){
        it.classList.add("open");
        var t=it.querySelector(".h-top"); if(t) t.setAttribute("aria-expanded","true");
      }
    });
    Array.prototype.forEach.call(document.querySelectorAll(".h-top"),function(t){
      var fn=function(){
        var open=t.parentElement.classList.toggle("open");
        t.setAttribute("aria-expanded",open?"true":"false");
      };
      t.addEventListener("click",fn);
      t.addEventListener("keydown",function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); fn(); } });
    });
    // jump from a session's exercise name to its progress row
    Array.prototype.forEach.call(document.querySelectorAll("[data-jump]"),function(el){
      var fn=function(ev){
        if(ev) ev.stopPropagation();
        var items=document.querySelectorAll(".p-item");
        for(var i=0;i<items.length;i++){
          if(items[i].dataset.ex===el.dataset.jump){
            items[i].classList.add("open");
            var t=items[i].querySelector(".h-top"); if(t) t.setAttribute("aria-expanded","true");
            items[i].scrollIntoView({behavior:"smooth",block:"center"});
            return;
          }
        }
      };
      el.addEventListener("click",fn);
      el.addEventListener("keydown",function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); e.stopPropagation(); fn(); } });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-edit]"),function(b){
      b.addEventListener("click",function(ev){
        ev.stopPropagation();
        startEdit(sorted[+b.dataset.edit]);
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-del]"),function(b){
      b.addEventListener("click",function(ev){
        ev.stopPropagation();
        if(b.classList.contains("armed")){
          var key=sorted[+b.dataset.del];
          var pos=DB.sessions.indexOf(key);
          if(pos>-1) DB.sessions.splice(pos,1);
          var ok=save(); render();
          toastAction(ok?"Session deleted":"Session deleted (storage unavailable)",function(){
            DB.sessions.push(key);
            var ok2=save(); render();
            toast(ok2?"Session restored":"Restored for this visit only");
          });
        } else { b.classList.add("armed"); b.textContent="Tap again to delete";
          setTimeout(function(){ b.classList.remove("armed"); b.textContent="Delete session"; },4000); }
      });
    });
    var rs=$("reset");
    if(rs) rs.addEventListener("click",function(){
      if(rs.classList.contains("armed")){
        var had=DB.sessions.length>0;
        if(had) exportData(); // a backup lands in Downloads before anything is destroyed
        // belt and braces: downloads can fail silently (notably iOS standalone),
        // so stash the erased data in storage as a recovery copy too
        if(had){ try{ localStorage.setItem(KEY+"-erased", JSON.stringify(DB.sessions)); }catch(e){} }
        DB.sessions=[]; DB.meta.lastProg=null;
        DB.meta.cycle={start:dayISO(startOfWeek(new Date())), num:1, weeklyGoal:4};
        draftClear();
        save(); render();
        toast(had?"History erased — backup downloaded":"History erased");
      }
      else { rs.classList.add("armed"); rs.textContent="Tap again to erase everything";
        setTimeout(function(){ rs.classList.remove("armed"); rs.textContent="Erase all history"; },4000); }
    });
  }

  /* ---------- toast ---------- */
  var tT;
  function resetToast(t){ t.classList.remove("show"); t.style.pointerEvents="none"; t.onclick=null; }
  function toast(m){
    var t=$("toast"); resetToast(t);
    t.textContent=m; t.classList.add("show");
    clearTimeout(tT); tT=setTimeout(function(){resetToast(t);},2400);
  }
  function toastAction(m,fn){
    var t=$("toast"); resetToast(t);
    t.textContent=m;
    var b=document.createElement("button");
    b.type="button"; b.className="toast-btn"; b.textContent="Undo";
    b.addEventListener("click",function(ev){ ev.stopPropagation(); resetToast(t); fn(); });
    t.appendChild(b);
    t.classList.add("show");
    t.style.pointerEvents="auto";
    t.onclick=function(){ resetToast(t); fn(); };
    clearTimeout(tT); tT=setTimeout(function(){resetToast(t);},6000);
  }

  /* ---------- rest timer ---------- */
  var REST_SET=30, REST_EX=60; // between sets / between exercises
  var restDur=REST_SET, restEndAt=0, restTimer=null, audioCtx=null;
  function ensureAudio(){
    try{
      var AC=window.AudioContext||window.webkitAudioContext;
      if(!AC) return;
      if(!audioCtx) audioCtx=new AC();
      if(audioCtx.state==="suspended") audioCtx.resume();
    }catch(e){}
  }
  function beep(){
    if(!audioCtx) return;
    try{
      [0,0.25].forEach(function(off){
        var o=audioCtx.createOscillator(), g=audioCtx.createGain();
        o.frequency.value=880; o.connect(g); g.connect(audioCtx.destination);
        var t=audioCtx.currentTime+off;
        g.gain.setValueAtTime(0.0001,t);
        g.gain.exponentialRampToValueAtTime(0.2,t+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001,t+0.15);
        o.start(t); o.stop(t+0.18);
      });
    }catch(e){}
  }
  function startRest(dur,label){
    ensureAudio(); // inside the tap gesture so iOS allows the later beep
    restDur=dur||REST_SET; // +30s extensions apply to one rest only
    restEndAt=Date.now()+restDur*1000;
    var chip=$("rest-chip");
    var lbl=chip.querySelector(".rc-label");
    if(lbl) lbl.textContent=label||"REST";
    chip.classList.remove("over");
    chip.style.display="flex";
    clearInterval(restTimer);
    restTimer=setInterval(tickRest,250);
    tickRest();
  }
  function tickRest(){
    if(!restEndAt) return;
    var left=restEndAt-Date.now();
    if(left<=0){ finishRest(); return; }
    var s=Math.ceil(left/1000);
    $("rc-time").textContent=Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
    $("rc-bar").style.width=Math.max(0,Math.min(100,left/(restDur*1000)*100))+"%";
  }
  function finishRest(){
    clearInterval(restTimer); restTimer=null; restEndAt=0;
    var chip=$("rest-chip");
    chip.classList.add("over");
    $("rc-time").textContent="GO";
    $("rc-bar").style.width="0%";
    if(navigator.vibrate){ try{ navigator.vibrate([200,100,200]); }catch(e){} }
    beep();
    // don't let the GO state expire invisibly while the tab is backgrounded
    setTimeout(function(){ if(!restEndAt&&!document.hidden) chip.style.display="none"; },4000);
  }
  function stopRest(){
    clearInterval(restTimer); restTimer=null; restEndAt=0;
    var chip=$("rest-chip"); if(chip) chip.style.display="none";
  }

  /* ---------- backup: export / import ---------- */
  var APPID="training-tracker";
  function download(name,text){
    var blob=new Blob([text],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a"); a.href=url; a.download=name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1500);
  }
  function exportData(){
    var d=new Date();
    var payload={app:APPID,version:2,exportedAt:d.toISOString(),sessions:DB.sessions,meta:DB.meta};
    download("training-tracker-backup-"+dayISO(d)+".json", JSON.stringify(payload,null,2));
    toast(DB.sessions.length ? ("Exported "+DB.sessions.length+" session"+(DB.sessions.length>1?"s":"")) : "Exported an empty backup");
  }
  function pickImport(){
    var inp=document.createElement("input"); inp.type="file"; inp.accept="application/json,.json";
    inp.addEventListener("change",function(){ if(inp.files&&inp.files[0]) importData(inp.files[0]); });
    inp.click();
  }
  function contentKey(s){
    return s.date+"|"+s.dayType+"|"+JSON.stringify(s.exercises)+"|"+JSON.stringify(s.cardio)+"|"+
      JSON.stringify(s.warmup)+"|"+JSON.stringify(s.cooldown)+"|"+(s.kneeFlag?1:0)+"|"+
      (s.option||"")+"|"+JSON.stringify(s.blocks||[])+"|"+(s.minutes||"")+"|"+(s.resistance||"")+"|"+(s.rounds||"")+"|"+(s.machine||"")+"|"+s.notes;
  }
  function importData(file){
    var reader=new FileReader();
    reader.onload=function(){
      var data;
      try{ data=JSON.parse(reader.result); }catch(e){ toast("Couldn't read that file"); return; }
      if(data&&data.app&&data.app!==APPID){ toast("That backup is from a different tracker"); return; }
      var arr=Array.isArray(data)?data:(data&&data.sessions);
      if(!Array.isArray(arr)){ toast("No sessions found in that file"); return; }
      var byT={}, seenKey={}, seenDate={};
      DB.sessions.forEach(function(s,i){
        if(s._t) byT[s._t]=i;
        seenKey[contentKey(s)]=true;
        seenDate[s.date]=true;
      });
      var added=0, updated=0, skippedBad=0;
      arr.forEach(function(raw){
        var s=normalizeSession(raw);
        if(!s){ skippedBad++; return; }
        if(s._t&&byT[s._t]!=null){
          // same identity: adopt the backup's copy only when it is a NEWER edit
          var cur=DB.sessions[byT[s._t]];
          if((s._edited||0)>(cur._edited||0)){ DB.sessions[byT[s._t]]=s; updated++; }
          return;
        }
        var k=contentKey(s);
        if(seenKey[k]) return;
        // legacy (pre-_t) backups: an identical timestamp is the same session,
        // even if its content has since been amended locally
        if(!s._t&&seenDate[s.date]) return;
        if(!s._t) s._t=freshT();
        DB.sessions.push(s);
        byT[s._t]=DB.sessions.length-1; seenKey[k]=true; seenDate[s.date]=true;
        added++;
      });
      if((!DB.meta||!DB.meta.lastProg)&&data&&data.meta&&data.meta.lastProg&&!isNaN(Date.parse(data.meta.lastProg))){
        DB.meta=DB.meta||{}; DB.meta.lastProg=data.meta.lastProg;
      }
      // adopt the backup's cycle only when it is AHEAD of the local one — restoring
      // an old backup must not rewind the current cycle number, anchor, or goal
      if(data&&data.meta&&validCycle(data.meta.cycle)&&
         (!validCycle(DB.meta.cycle)||data.meta.cycle.num>DB.meta.cycle.num)){
        DB.meta.cycle={
          start:dayISO(startOfWeek(parseDay(data.meta.cycle.start))), // grid math assumes a Monday anchor
          num:data.meta.cycle.num, weeklyGoal:data.meta.cycle.weeklyGoal
        };
      }
      var ok=save(); render();
      var msg=added?("Imported "+added+" session"+(added>1?"s":"")):(updated?"":"Already up to date");
      if(updated) msg+=(msg?" · ":"")+"updated "+updated;
      if(!msg) msg="Already up to date";
      if(skippedBad) msg+=" · skipped "+skippedBad+" malformed";
      if((added||updated)&&!ok) msg+=" — saved for this visit only";
      toast(msg);
    };
    reader.readAsText(file);
  }

  /* ---------- init ---------- */
  ensureCycle();
  // draft autosave for typed input (set fields, cardio minutes, notes)
  root().addEventListener("input",function(){
    if(view==="session"&&sess&&!editingRef){ gather(); draftSave(); }
  });
  $("rest-chip").addEventListener("click",function(){ stopRest(); });
  $("rc-add").addEventListener("click",function(e){
    e.stopPropagation();
    if(restEndAt){ restEndAt+=30000; restDur+=30; tickRest(); }
  });
  $("rc-skip").addEventListener("click",function(e){ e.stopPropagation(); stopRest(); });
  document.addEventListener("visibilitychange",function(){
    if(document.hidden) return;
    if(restEndAt){ tickRest(); return; }
    // the rest finished while backgrounded: show GO now, then hide
    var chip=$("rest-chip");
    if(chip.classList.contains("over")&&chip.style.display!=="none"){
      setTimeout(function(){ if(!restEndAt) chip.style.display="none"; },4000);
    }
  });
  // multi-tab safety: when another tab writes the store, refresh this one's view
  // while idle instead of later clobbering it with a stale snapshot
  window.addEventListener("storage",function(e){
    if(e.key===KEY&&!sess){
      DB=load();
      if(!DB.meta) DB.meta={lastProg:null};
      if(!DB.sessions) DB.sessions=[];
      ensureCycle();
      render();
    }
  });

  render();
})();
</script>
</body>
</html>
